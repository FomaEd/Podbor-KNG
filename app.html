<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подбор фурнитуры KNG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <div class="card">
            <div class="header">
                <div class="logo-circle"></div>
                <div>
                    <h1>Подбор фурнитуры</h1>
                    <p class="subtitle">для окон KNG</p>
                </div>
            </div>
            
            <div class="form-group">
                <label for="window-type">Тип окна</label>
                <select id="window-type" class="form-select">
                    <option value="">Выберите тип окна</option>
                    <option value="casement">Поворотное</option>
                    <option value="tilt-turn">Поворотно-откидное</option>
                    <option value="sliding">Раздвижное</option>
                </select>
            </div>

            <div class="form-group">
                <label for="width">Ширина окна (мм)</label>
                <input type="number" id="width" class="form-input" placeholder="Введите ширину">
            </div>

            <div class="form-group">
                <label for="height">Высота окна (мм)</label>
                <input type="number" id="height" class="form-input" placeholder="Введите высоту">
            </div>

            <button id="calculate-btn" class="btn-primary">Рассчитать</button>

            <div id="results" class="results hidden">
                <h3>Результаты расчета</h3>
                <div id="results-content"></div>
            </div>
        </div>
    </div>

    <script src="js/matrices.js"></script>
    <script src="js/logic.js"></script>
</body>
</html>
